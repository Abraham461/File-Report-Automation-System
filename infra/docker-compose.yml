version: "3.9"

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace backend"
    ports:
      - "4000:4000"
    volumes:
      - ..:/app
    env_file:
      - ../.env

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace frontend -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
    depends_on:
      - backend
